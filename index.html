<!DOCTYPE html>
<html>
<head>
    <title>Interactive Cube</title>
    <link rel="stylesheet" type="text/css" href="styles.css">
</head>
<body>
    <div id="container">
        <div id="animation" onmouseover="stopRotation()" onmouseout="startRotation()" onclick="changeSide()">
            <div class="cube">
                <div class="face" id="linkedin">
                    <a href="https://linkedin.com" target="_blank"></a>
                </div>
                <div class="face" id="github">
                    <a href="https://github.com" target="_blank"></a>
                </div>
                <div class="face" id="twitter">
                    <a href="https://twitter.com" target="_blank"></a>
                </div>
                <div class="face" id="phone">
                    <a href="tel:+1234567890"></a>
                </div>
                <div class="face" id="email">
                    <a href="mailto:your-email@example.com"></a>
                </div>
                <div class="face" id="about">
                    <a href="about.html"></a>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
